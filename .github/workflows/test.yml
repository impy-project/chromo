name: Test

on:
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'README.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  prepare-cache:
    if: contains(github.event.pull_request.labels.*.name, 'skip CI') == false
    runs-on: ubuntu-latest
    steps:
      - name: Restore chromo data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/chromo
          key: chromo-cache-v2
      - name: Download all cache files if missing
        run: |
          mkdir -p ~/.cache/chromo
          for file in qgsjet_v002 Pythia8_v006 eposlhcr_v001 eposlhc_v001 dpm3191_v001 dpm3_v001 ; do
            if [ ! -f ~/.cache/chromo/$file.zip ]; then
              echo "Downloading $file.zip..."
              curl -L -o ~/.cache/chromo/$file.zip "https://github.com/impy-project/chromo/releases/download/zipped_data_v1.0/$file.zip"
            else
              echo "$file.zip already exists, skipping."
            fi
          done
      - name: Save chromo data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/chromo
          key: chromo-cache-v2

  test:
    if: contains(github.event.pull_request.labels.*.name, 'skip CI') == false
    needs: prepare-cache
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Python version number must be string, otherwise 3.10 becomes 3.1
          # Disable Windows for now, as long as numpy is buggy on Windows
          # - os: windows-latest
          #   python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-24.04-arm
            python-version: "3.13"
      fail-fast: false
    steps:
      - name: Restore chromo data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/chromo
          key: chromo-cache-v2
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 3
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: awvwgk/setup-fortran@main
        id: setup-fortran
        with:
          compiler: gcc
          version: 13
      - run: python -m pip install --upgrade pip
      - if: ${{ matrix.os != 'windows-latest' }}
        run: uv pip install --system -v .[test]
      - if: ${{ matrix.os == 'windows-latest' }}
        run: python -m pip install --prefer-binary -v .[test]
        env:
          CMAKE_GENERATOR: "MinGW Makefiles"
          FC: ${{ steps.setup-fortran.outputs.fc }}
      # graphviz is needed for tests, only install it when compilation succeed
      - uses: tlylt/install-graphviz@v1
      # Tests run in parallel, but data download is currently not thread-safe.
      # We work around this by downloading all data files upfront.
      - run: python scripts/download_data.py
      - run: python -m pytest -vv -n 3
        env:
          no_proxy: '*'
      # always() ensures upload even if pytest ends with failures
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.python-version }}
          path: "fig/**"

  cibuildwheel:
    if: contains(github.event.pull_request.labels.*.name, 'skip CI') == false
    needs: prepare-cache
    name: cibw ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-intel-latest, macos-latest]
    steps:
      - name: Restore chromo data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/chromo
          key: chromo-cache-v2

      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.os == 'macos-intel-latest' && '13.0' || '14.0' }}" >> $GITHUB_ENV

      - uses: awvwgk/setup-fortran@main
        id: setup-fortran
        with:
          compiler: gcc
          version: 13

      - if: ${{ matrix.os != 'macos-intel-latest' }}
        uses: ts-graphviz/setup-graphviz@v2
        name: Install Graphviz

      - if: ${{ matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm' }}
        name: cibuildwheel on Linux
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: cp314-*
          CIBW_ARCHS: auto
          CIBW_ENVIRONMENT_PASS_LINUX: CI

      - name: Random delay to avoid rate limits
        if: runner.os == 'macOS'
        run: |
          delay=$((RANDOM % 14 + 2))
          echo "Sleeping $delay seconds to stagger cibuildwheel downloads..."
          sleep $delay

      - if: ${{ matrix.os == 'macos-intel-latest' }}
        name: cibuildwheel on macOS Intel
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: cp314-*
          CIBW_ARCHS: auto
          no_proxy: '*'
          CHROMO_SKIP_GRAPHVIZ: 1
          CIBW_TEST_COMMAND: 'pytest -n auto -vv -k "not QgsjetIII" {project}/tests'

      - if: ${{ matrix.os == 'macos-latest' }}
        name: cibuildwheel on macOS
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: cp314-*
          CIBW_ARCHS: auto
          no_proxy: '*'
          CIBW_TEST_COMMAND: 'pytest -n auto -vv -k "not QgsjetIII" {project}/tests'

      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: wheel-cp314-${{ matrix.os }}
